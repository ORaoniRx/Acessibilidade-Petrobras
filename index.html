<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Site Acessível</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="d-flex align-items-center min-vh-100 py-4">
    <!-- Skip link -->
    <a class="visually-hidden-focusable position-absolute top-0 start-0 mt-2 ms-2 p-2 bg-primary text-white rounded z-3" 
       href="#main-content">
        ⏭️ Pular para conteúdo principal
    </a>

    <main id="main-content" class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-6">
                <div class="card voice-container shadow-lg border-0 rounded-4 overflow-hidden h-100">
                    <div class="card-body p-5 text-center">
                        <!-- Logo/Título -->
                        <div class="mb-5">
                            <div class="display-3 mb-3">
                                <i class="bi bi-house-heart-fill text-primary"></i>
                            </div>
                            <h1 class="display-4 fw-bold mb-3 text-white">Bem-vindo!</h1>
                            <p class="lead text-white-50 mb-0">Site totalmente acessível</p>
                        </div>

                        <!-- Status do Talkback -->
                        <div id="status" 
                             class="alert alert-success border-4 rounded-4 mb-4 p-4 fs-4 fw-semibold shadow d-flex align-items-center justify-content-center"
                             role="status" aria-live="polite"
                             style="min-height: 80px;">
                            <i class="bi bi-mic-fill fs-2 me-3"></i>
                            <span>✅ Talkback ATIVO - Navegação por voz liberada</span>
                        </div>

                        <!-- Botões de Controle -->
                        <div class="row g-4 mb-5">
                            <div class="col-12 col-md-6">
                                <button id="voiceBtn" 
                                        class="btn btn-success btn-lg w-100 py-4 fs-3 fw-bold rounded-4 shadow-lg border-0 h-100 position-relative"
                                        style="min-height: 100px;"
                                        aria-pressed="true"
                                        aria-label="Manter Talkback ativo (status: ativo)"
                                        autofocus onclick="window.location.href='login.html';">
                                    <i class="bi bi-mic-fill fs-1 d-block mb-2"></i>
                                    <span class="d-block h5 mb-0">✅ Manter Ativo</span>
                                </button>
                            </div>
                            <div class="col-12 col-md-6">
                                <button id="muteBtn" 
                                        class="btn btn-danger btn-lg w-100 py-4 fs-3 fw-bold rounded-4 shadow-lg border-0 h-100"
                                        style="min-height: 100px;"
                                        aria-label="Desativar Talkback"
                                        aria-pressed="false" onclick="window.location.href='login.html';">
                                    <i class="bi bi-volume-mute-fill fs-1 d-block mb-2"></i>
                                    <span class="d-block h5 mb-0">❌ Desativar</span>
                                </button>
                            </div>
                        </div>


                        <!-- Footer -->
                        <div class="mt-5 pt-4 border-top">
                            <p class="text-white-50 mb-0">
                                <small>WCAG 2.1 AA • Talkback ativo</small>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/index/talkback.js"></script>
</body>
</html>
