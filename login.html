<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal de Atendimento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="./css/darkmode.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-building text-success display-1"></i>
                            <h1 class="h3 mt-3 fw-bold">Acesso ao Portal</h1>
                            <p class="text-muted">Entre com suas credenciais</p>
                        </div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="usuario" class="form-label fw-semibold">Usuário</label>
                                <input type="text" class="form-control form-control-lg" id="usuario" required>
                            </div>
                            <div class="mb-4">
                                <label for="senha" class="form-label fw-semibold">Senha</label>
                                <input type="password" class="form-control form-control-lg" id="senha" required>
                            </div>
                            <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                                Usuário ou senha incorretos.
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>


    <script src="js/main.js"></script>
    <script src="./js/login/login.js"></script>
</body>
</html>
