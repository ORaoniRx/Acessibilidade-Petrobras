<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Portal Petrobras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">

    <link rel="stylesheet" href="./css/darkmode.css">
    <link rel="stylesheet" href="./css/darkmode.css">

</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home.html">
                <i class="bi bi-building me-2"></i>Petrobras
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="home.html"><i class="bi bi-house me-1"></i> Voltar</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-dark text-white py-4">
                        <h2 class="mb-0 h4"><i class="bi bi-gear-fill me-2"></i>Preferências do Sistema</h2>
                    </div>
                    <div class="card-body p-4">
                        
                        <div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom">
                            <div>
                                <h5 class="mb-1">Modo Escuro</h5>
                                <p class="text-muted small mb-0">Reduz o cansaço visual em ambientes escuros.</p>
                            </div>
                            <div class="form-check form-switch fs-4">
                                <input class="form-check-input" type="checkbox" id="switchDarkMode" onclick="toggleDarkMode()">
                            </div>
                        </div>

                        <div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom">
                            <div>
                                <h5 class="mb-1">Modo Daltonismo</h5>
                                <p class="text-muted small mb-0">Otimiza as cores para melhor distinção visual.</p>
                            </div>
                            <div class="form-check form-switch fs-4">
                                <input class="form-check-input" type="checkbox" id="switchDaltonismo" onclick="toggleDaltonismo()">
                            </div>
                        </div>

                        <div class="mb-4">
                            <h5 class="mb-3">Tradução de Chat por IA</h5>
                            <label for="selectIdioma" class="form-label">Traduzir mensagens do Chat Global para:</label>
                            <select class="form-select form-select-lg" id="selectIdioma" onchange="updateLanguage()">
                                <option value="pt">Português (Original)</option>
                                <option value="en">Inglês (IA Translation)</option>
                                <option value="es">Espanhol (IA Translation)</option>
                                <option value="fr">Francês (IA Translation)</option>
                            </select>
                            <div class="form-text mt-2 text-success">
                                <i class="bi bi-robot me-1"></i> IA Ativa: As mensagens serão traduzidas automaticamente ao chegar.
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>

    <script src="./js/config/buttons.js"></script>
</body>
</html>
