<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Portal Petrobras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">

    <link rel="stylesheet" href="./css/darkmode.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="home.html">
                <i class="bi bi-building me-2"></i>Petrobras
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="home.html"><i class="bi bi-house me-1"></i> Voltar ao Início</a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-success text-white py-4 text-center">
                        <h2 class="mb-0 fw-bold"><i class="bi bi-person-gear me-2"></i>Configurações de Perfil</h2>
                    </div>
                    <div class="card-body p-4 p-lg-5">
                        <form id="profileForm">
                            <div class="mb-4">
                                <label for="newName" class="form-label fw-semibold">Nome Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="newName" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="newPassword" class="form-label fw-semibold">Nova Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="newPassword" required>
                                </div>
                                <div class="form-text">Mínimo de 6 caracteres.</div>
                            </div>

                            <div id="saveMessage" class="alert alert-success d-none mb-4" role="alert">
                                Dados atualizados com sucesso!
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="bi bi-check-circle me-2"></i>Salvar Alterações
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
