<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Colaborativo - Petrobras</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/home.css">

    <style>
        #chat-window {
            height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
        }
        .message-sent {
            background-color: #d1e7dd;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        .message-received {
            background-color: #fff;
            border: 1px solid #dee2e6;
            border-bottom-left-radius: 2px;
        }
        .timestamp {
            font-size: 0.75rem;
            color: #6c757d;
            display: block;
            margin-top: 5px;
        }
    </style>
</head>
<body class="bg-light">

    <!-- Skip to main content -->
    <a class="visually-hidden-focusable p-3" href="#main-content" tabindex="0" 
       onclick="speak('Pulando para conteúdo principal')">Ir para conteúdo principal</a>

    <!-- Navbar Acessível -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top" role="banner" aria-label="Navegação principal">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" aria-label="Página inicial do Portal de Atendimento">
                <i class="bi bi-building me-2" aria-hidden="true"></i>Petrobras
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Alternar navegação"
                    onclick="speak('Abrindo menu de navegação')">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="demandas.html" aria-label="Abrir aba de Demandas" 
                           onclick="speak('Navegando para Demandas')">
                            <i class="bi bi-exclamation-triangle me-1" aria-hidden="true"></i>
                            Demandas
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="chat.html" aria-label="Abrir aba de Trading" 
                           onclick="speak('Navegando para Trading')">
                            <i class="bi bi-people me-1" aria-hidden="true"></i>
                            Chat
                        </a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" id="userDropdown" 
                           data-bs-toggle="dropdown" aria-expanded="false"
                           aria-label="Menu do usuário João Silva"
                           onclick="speak('Menu do usuário')">
                            <i class="bi bi-person-circle me-1" aria-hidden="true"></i>
                            João Silva
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="#">Meu Perfil</a></li>
                            <li><a class="dropdown-item" href="#">Configurações</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Sair</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="main-content" class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-chat-dots me-2"></i>Mural da Semana</h5>
                        <span id="week-indicator" class="badge bg-light text-dark">Semana Atual</span>
                    </div>
                    
                    <div class="card-body">
                        <div id="chat-window" class="p-3 mb-3 shadow-inner">
                            </div>

                        <form id="chat-form" class="input-group">
                            <input type="text" id="user-input" class="form-control" placeholder="Digite sua mensagem..." required>
                            <button class="btn btn-success" type="submit">
                                <i class="bi bi-send"></i>
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted mt-3 small">
                    <i class="bi bi-info-circle"></i> Este chat é reiniciado a cada segunda-feira.
                </p>
            </div>
        </div>
    </main>

    <script src="./js/chat/chat.js">
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
